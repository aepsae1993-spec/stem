<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDFStamp - Pro Business Tool V16</title>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <!-- Fonts & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Sarabun', 'TH Sarabun PSK', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Styles that Tailwind doesn't cover easily */
        body { overscroll-behavior: none; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Tool Active State */
        .active-tool {
            background-color: #eff6ff !important;
            color: #2563eb !important;
            box-shadow: inset 0 0 0 2px #2563eb !important;
        }

        /* Canvas Cursors */
        .cursor-pen .upper-canvas { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewport="0 0 24 24" style="fill:black;stroke:white;stroke-width:1px;"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>') 0 24, auto !important; }
        .cursor-highlight .upper-canvas { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewport="0 0 24 24" style="fill:orange;stroke:black;stroke-width:1px;"><path d="M15.25 2.25l-2.5 2.5 5 5 2.5-2.5-5-5zM2.25 15.25l5 5 10.5-10.5-5-5-10.5 10.5z"/></svg>') 0 24, auto !important; }
        .cursor-text .upper-canvas { cursor: text !important; }
        .cursor-crosshair .upper-canvas { cursor: crosshair !important; }

        /* Range Slider Styling */
        input[type=range] { accent-color: #3b82f6; }
        
        /* File Input Hide */
        input[type=file] { display: none; }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col overflow-hidden text-slate-800">

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[2000] hidden flex-col justify-center items-center text-white">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500 mb-4"></div>
        <h2 class="text-2xl font-bold">⏳ กำลังประมวลผล...</h2>
        <p id="loadingText" class="text-slate-300 mt-2">กรุณารอสักครู่</p>
    </div>

    <!-- Context Menu -->
    <div id="customContextMenu" class="hidden fixed z-[3000] bg-white border border-slate-200 rounded-lg shadow-xl py-1 min-w-[180px]">
        <div class="px-4 py-2 hover:bg-blue-50 hover:text-blue-600 cursor-pointer text-sm font-medium flex items-center gap-2 transition-colors" onclick="addTextToPresetFromMenu()">
            ⭐ เพิ่มเป็นข้อความที่ใช้บ่อย
        </div>
    </div>

    <!-- Header -->
    <header class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-4 sm:px-6 shrink-0 z-20 shadow-sm relative">
        <div class="flex items-center gap-3">
            <button class="md:hidden p-2 -ml-2 text-slate-500 hover:bg-slate-100 rounded-lg" onclick="toggleSidebar()">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">PDF<span class="text-blue-600">Stamp</span> <span class="text-xs font-normal text-slate-400 align-top">Pro</span></h1>
        </div>
        
        <div class="flex items-center gap-2">
            <button class="text-sm font-medium px-3 py-1.5 rounded-md border border-slate-300 bg-white hover:bg-slate-50 text-slate-700 shadow-sm transition-colors flex items-center gap-1" onclick="saveProject()">
                <span>💾</span> <span class="hidden sm:inline">Save Project</span>
            </button>
            <label class="text-sm font-medium px-3 py-1.5 rounded-md border border-slate-300 bg-white hover:bg-slate-50 text-slate-700 shadow-sm transition-colors cursor-pointer flex items-center gap-1" for="projectLoad">
                <span>📂</span> <span class="hidden sm:inline">Open Project</span>
            </label>
            <input type="file" id="projectLoad" accept=".pdfstamp" onchange="loadProject(this)">
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden relative">
        
        <!-- Mobile Sidebar Overlay -->
        <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/50 z-30 hidden transition-opacity md:hidden" onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-[280px] sm:w-[320px] bg-slate-50 border-r border-slate-200 transform -translate-x-full md:translate-x-0 md:relative transition-transform duration-300 ease-in-out flex flex-col shrink-0">
            <!-- Header sidebar on mobile -->
            <div class="flex justify-between items-center p-4 border-b border-slate-200 md:hidden bg-white">
                <h2 class="font-bold text-slate-800">จัดการเอกสาร</h2>
                <button onclick="toggleSidebar()" class="p-1 text-slate-500 hover:bg-slate-100 rounded">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-6">
                <!-- Section 1: Upload -->
                <div>
                    <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-3">📁 เพิ่มเอกสาร</h2>
                    <label for="docUpload" class="block bg-white border-2 border-dashed border-blue-300 hover:border-blue-500 rounded-xl p-6 text-center cursor-pointer transition-all group shadow-sm hover:shadow-md">
                        <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-2 group-hover:scale-110 transition-transform">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        </div>
                        <span class="block text-blue-600 font-bold mb-1">เลือกไฟล์ PDF หรือรูปภาพ</span>
                        <span class="text-xs text-slate-400">รองรับหลายไฟล์พร้อมกัน</span>
                    </label>
                    <input type="file" id="docUpload" accept="image/*,application/pdf" multiple>
                </div>

                <!-- Section 2: File List -->
                <div id="fileList" class="flex flex-col gap-3 empty:hidden"></div>

                <!-- Section 3: Presets -->
                <div class="pt-4 border-t border-slate-200">
                    <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-3">📝 ข้อความที่ใช้บ่อย</h2>
                    <div class="flex gap-2 mb-3">
                        <input type="text" id="newPresetInput" class="flex-1 bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 shadow-sm" placeholder="พิมพ์ข้อความใหม่...">
                        <button class="bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg px-3 py-2 font-bold shadow-sm transition-colors" onclick="addPreset()">+</button>
                    </div>
                    <div id="presetList" class="flex flex-col gap-2"></div>
                </div>
            </div>
        </aside>

        <!-- Workspace -->
        <main class="flex-1 flex flex-col min-w-0 bg-slate-200/50 relative">
            
            <!-- Horizontal Toolbar -->
            <nav class="bg-white border-b border-slate-200 p-2 sm:px-4 flex items-center gap-3 sm:gap-4 overflow-x-auto shrink-0 shadow-sm z-10 scrollbar-hide">
                
                <!-- Tools -->
                <div class="flex items-center gap-1.5 pr-3 border-r border-slate-200 shrink-0">
                    <button id="tool-select" class="p-2 sm:px-3 rounded-lg text-slate-600 hover:bg-slate-100 transition-colors font-medium text-sm flex items-center gap-1 active-tool" onclick="setTool('select')" title="เลือก (Select)">👆</button>
                    <button id="tool-pen" class="p-2 sm:px-3 rounded-lg text-slate-600 hover:bg-slate-100 transition-colors font-medium text-sm flex items-center gap-1" onclick="setTool('pen')" title="ปากกา (Pen)">✏️</button>
                    <button id="tool-highlight" class="p-2 sm:px-3 rounded-lg text-slate-600 hover:bg-slate-100 transition-colors font-medium text-sm flex items-center gap-1" onclick="setTool('highlight')" title="ไฮไลท์ (Highlight)">🖍️</button>
                    <button id="tool-text" class="p-2 sm:px-3 rounded-lg text-slate-600 hover:bg-slate-100 transition-colors font-medium text-sm flex items-center gap-1" onclick="setTool('text')" title="ข้อความ (Text)">🅰️</button>
                </div>

                <!-- Color & Size -->
                <div class="flex items-center gap-2 pr-3 border-r border-slate-200 shrink-0">
                    <div class="flex gap-1 bg-slate-100 p-1 rounded-md border border-slate-200">
                        <div class="w-6 h-6 rounded border border-slate-300 cursor-pointer hover:scale-110 transition-transform shadow-sm" style="background:#000" onclick="setPaletteColor('#000000')"></div>
                        <div class="w-6 h-6 rounded border border-slate-300 cursor-pointer hover:scale-110 transition-transform shadow-sm" style="background:#00f" onclick="setPaletteColor('#0000ff')"></div>
                        <div class="w-6 h-6 rounded border border-slate-300 cursor-pointer hover:scale-110 transition-transform shadow-sm" style="background:red" onclick="setPaletteColor('#ff0000')"></div>
                        <div class="w-6 h-6 rounded border border-slate-300 cursor-pointer hover:scale-110 transition-transform shadow-sm" style="background:#ff0" onclick="setPaletteColor('#FFFF00')"></div>
                    </div>
                    <div class="relative w-8 h-8 rounded-full border-2 border-slate-300 overflow-hidden shrink-0 shadow-sm cursor-pointer">
                        <input type="color" id="colorPicker" value="#000000" class="absolute -top-2 -left-2 w-16 h-16 cursor-pointer" onchange="updateDrawSettings()">
                    </div>
                    <input type="range" id="sizeSlider" min="1" max="50" value="3" class="w-20 sm:w-24 cursor-pointer" oninput="updateDrawSettings()">
                </div>

                <!-- Stamps -->
                <div class="flex items-center gap-2 pr-3 border-r border-slate-200 shrink-0 h-10">
                    <label for="stampUpload" class="bg-blue-50 hover:bg-blue-100 text-blue-600 border border-blue-200 rounded-lg px-3 py-1.5 text-sm font-bold cursor-pointer transition-colors shadow-sm whitespace-nowrap">
                        ©️ เพิ่มตรา
                    </label>
                    <input type="file" id="stampUpload" accept="image/png,image/jpeg" multiple>
                    <div class="flex items-center gap-2 overflow-x-auto h-full px-1" id="stampGallery" style="max-width: 150px;">
                        <!-- Stamps will be injected here -->
                    </div>
                </div>

                <!-- Memory Slots -->
                <div class="flex items-center gap-2 pr-3 border-r border-slate-200 shrink-0">
                    <select id="slotSelect" class="bg-orange-50 border border-orange-200 text-orange-700 text-sm rounded-lg focus:ring-orange-500 focus:border-orange-500 block p-1.5 font-bold cursor-pointer" onchange="loadFromSlot(this.value)">
                        <option value="1">Slot 1</option><option value="2">Slot 2</option><option value="3">Slot 3</option><option value="4">Slot 4</option><option value="5">Slot 5</option>
                    </select>
                    <button class="bg-orange-500 hover:bg-orange-600 text-white p-1.5 rounded-lg shadow-sm transition-colors" onclick="saveToCurrentSlot()" title="บันทึกลง Slot">💾</button>
                    <button class="bg-purple-500 hover:bg-purple-600 text-white p-1.5 rounded-lg shadow-sm transition-colors" onclick="loadFromCurrentSlot()" title="โหลดจาก Slot">📂</button>
                </div>

                <!-- Actions -->
                <div class="flex items-center gap-2 pr-3 border-r border-slate-200 shrink-0">
                    <button class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors shadow-sm" onclick="clearAllSignatures()">❌ ล้างหน้า</button>
                </div>

                <!-- Zoom -->
                <div class="flex items-center gap-1 shrink-0 bg-slate-100 rounded-lg p-1 border border-slate-200">
                    <button class="p-1 hover:bg-slate-200 rounded text-slate-600 font-bold" onclick="adjustZoom(-0.1)">-</button>
                    <span id="zoomDisplay" class="w-12 text-center text-sm font-bold text-slate-700">100%</span>
                    <button class="p-1 hover:bg-slate-200 rounded text-slate-600 font-bold" onclick="adjustZoom(0.1)">+</button>
                </div>

                <!-- Export (Right aligned on desktop, flow on mobile) -->
                <div class="flex items-center gap-2 ml-auto shrink-0 pl-2">
                    <select id="dlFormat" class="bg-white border border-slate-300 text-slate-700 text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 p-1.5 font-bold cursor-pointer shadow-sm">
                        <option value="pdf">PDF</option>
                        <option value="jpg">JPG</option>
                    </select>
                    <button class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-1.5 rounded-lg font-bold shadow-sm transition-colors flex items-center gap-2" onclick="downloadAllFiles()">
                        ⬇️ <span class="hidden sm:inline">ดาวน์โหลด</span>
                    </button>
                </div>

            </nav>

            <!-- Canvas Area -->
            <div class="flex-1 overflow-auto p-4 sm:p-8 flex justify-center items-start">
                <div id="scalableContent" class="flex flex-col gap-10 sm:gap-12 origin-top transition-transform duration-100 ease-out pb-20">
                    <div class="text-slate-400 text-center mt-20 text-lg flex flex-col items-center">
                        <svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        คลิก <strong>+ เพิ่มเอกสาร</strong> ที่เมนูด้านซ้าย<br>เพื่อเริ่มต้นทำงาน
                    </div>
                </div>
            </div>
            
        </main>
    </div>

    <script>
        // --- Core Application Logic ---
        let projectFiles = [], activeCanvases = [], masterStampsJSON = null;
        let currentZoom = 1, currentTool = 'select', drawColor = '#000000', drawWidth = 3;
        let isDrawingLine = false, lineToDraw = null;
        let pageHistory = {}, textPresets = [], activeTextForMenu = null;
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // --- UI Interactions ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        window.addEventListener('DOMContentLoaded', () => {
            const lastSlot = localStorage.getItem('pdfstamp_last_slot') || "1";
            document.getElementById('slotSelect').value = lastSlot;
            loadFromSlot(lastSlot, true);
            
            const savedPresets = localStorage.getItem('pdfstamp_presets');
            if(savedPresets) textPresets = JSON.parse(savedPresets);
            renderPresets();
            
            document.getElementById('newPresetInput').addEventListener('keydown', e => {
                if(e.key === 'Enter') addPreset();
            });
            
            window.addEventListener('click', () => {
                document.getElementById('customContextMenu').style.display = 'none';
            });
        });

        // --- Tools & Settings ---
        function setTool(toolName) {
            currentTool = toolName;
            if(toolName === 'highlight' && drawColor === '#000000') setPaletteColor('#FFFF00');
            
            document.querySelectorAll('#tool-select, #tool-pen, #tool-highlight, #tool-text').forEach(b => b.classList.remove('active-tool'));
            const btn = document.getElementById(`tool-${toolName}`);
            if(btn) btn.classList.add('active-tool');
            
            activeCanvases.forEach(item => {
                const wrapper = item.canvas.wrapperEl;
                wrapper.classList.remove('cursor-pen', 'cursor-highlight', 'cursor-text', 'cursor-crosshair');
                if(toolName === 'pen') wrapper.classList.add('cursor-pen');
                else if(toolName === 'highlight') wrapper.classList.add('cursor-highlight');
                else if(toolName === 'text') wrapper.classList.add('cursor-text');
                
                applyToolSettings(item.canvas);
            });
        }

        function setPaletteColor(hexColor) {
            document.getElementById('colorPicker').value = hexColor;
            updateDrawSettings();
        }

        function updateDrawSettings() {
            drawColor = document.getElementById('colorPicker').value;
            drawWidth = parseInt(document.getElementById('sizeSlider').value, 10);
            
            activeCanvases.forEach(item => {
                const obj = item.canvas.getActiveObject();
                if(obj) {
                    saveHistory(item.canvas);
                    if(obj.type === 'i-text') obj.set({ fill: drawColor });
                    else if(obj.type === 'path') obj.set({ stroke: drawColor, strokeWidth: drawWidth });
                    else if(obj.type === 'line') {
                        const isHighlight = obj.opacity < 1;
                        obj.set({ stroke: drawColor, strokeWidth: isHighlight ? drawWidth * 6 : drawWidth });
                    }
                    item.canvas.renderAll();
                }
                if(item.canvas.freeDrawingBrush) {
                    item.canvas.freeDrawingBrush.color = drawColor;
                    item.canvas.freeDrawingBrush.width = drawWidth;
                }
            });
        }

        function applyToolSettings(canvas) {
            canvas.isDrawingMode = false;
            canvas.selection = true;
            canvas.skipTargetFind = false;
            canvas.defaultCursor = 'default';
            
            canvas.off('mouse:down', handleMouseDown);
            canvas.off('mouse:move', handleMouseMove);
            canvas.off('mouse:up', handleMouseUp);
            
            if(currentTool === 'pen') {
                canvas.isDrawingMode = true;
                canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
                canvas.freeDrawingBrush.color = drawColor;
                canvas.freeDrawingBrush.width = drawWidth;
            } else if(currentTool === 'highlight' || currentTool === 'text') {
                canvas.selection = false;
                canvas.skipTargetFind = true;
                canvas.on('mouse:down', handleMouseDown);
                canvas.on('mouse:move', handleMouseMove);
                canvas.on('mouse:up', handleMouseUp);
            }
        }

        // --- Fabric Events ---
        function handleMouseDown(opt) {
            const canvas = this;
            const pointer = canvas.getPointer(opt.e);
            
            if(currentTool === 'text') {
                saveHistory(canvas);
                const text = new fabric.IText('ข้อความ', {
                    left: pointer.x, top: pointer.y,
                    fontFamily: 'TH Sarabun PSK, Sarabun, sans-serif',
                    fill: '#0000ff', fontSize: 24, cursorColor: 'blue'
                });
                canvas.add(text);
                canvas.setActiveObject(text);
                text.enterEditing();
                setTool('select');
                return;
            }
            
            if(currentTool === 'highlight') {
                isDrawingLine = true;
                saveHistory(canvas);
                const strokeW = drawWidth * 6;
                lineToDraw = new fabric.Line([pointer.x, pointer.y, pointer.x, pointer.y], {
                    strokeWidth: strokeW, fill: drawColor, stroke: drawColor,
                    opacity: 0.35, selectable: true, strokeLineCap: 'butt',
                    evented: true, originX: 'center', originY: 'center'
                });
                canvas.add(lineToDraw);
            }
        }

        function handleMouseMove(opt) {
            if(!isDrawingLine) return;
            const canvas = this;
            const pointer = canvas.getPointer(opt.e);
            lineToDraw.set({ x2: pointer.x, y2: pointer.y });
            canvas.renderAll();
        }

        function handleMouseUp(opt) {
            if(isDrawingLine) {
                isDrawingLine = false;
                lineToDraw.setCoords();
            }
        }

        // --- Presets ---
        function renderPresets() {
            const list = document.getElementById('presetList');
            list.innerHTML = '';
            textPresets.forEach((txt, idx) => {
                const div = document.createElement('div');
                div.className = 'bg-white border border-slate-200 p-2 rounded-lg cursor-pointer flex justify-between items-center hover:border-blue-400 hover:shadow-sm transition-all group';
                div.innerHTML = `
                    <span class="text-sm truncate flex-1" onclick="applyPreset('${txt}')">${txt}</span> 
                    <button class="text-slate-300 hover:text-red-500 font-bold px-2 rounded opacity-0 group-hover:opacity-100 transition-opacity" onclick="delPreset(${idx})">&times;</button>
                `;
                list.appendChild(div);
            });
        }

        function addPreset(txt = null) {
            if(!txt) {
                const input = document.getElementById('newPresetInput');
                txt = input.value.trim();
                if(txt) input.value = '';
            }
            if(txt && !textPresets.includes(txt)) {
                textPresets.push(txt);
                localStorage.setItem('pdfstamp_presets', JSON.stringify(textPresets));
                renderPresets();
            }
        }

        function delPreset(idx) {
            textPresets.splice(idx, 1);
            localStorage.setItem('pdfstamp_presets', JSON.stringify(textPresets));
            renderPresets();
        }

        function applyPreset(txt) {
            if(activeCanvases.length === 0) return alert('กรุณาเลือกหน้าเอกสารก่อน');
            const canvas = activeCanvases[0].canvas;
            saveHistory(canvas);
            const obj = new fabric.IText(txt, {
                left: canvas.width - 20, top: canvas.height - 20,
                fontFamily: 'TH Sarabun PSK, Sarabun, sans-serif',
                fill: '#0000ff', fontSize: 24,
                originX: 'right', originY: 'bottom', cursorColor: 'blue'
            });
            canvas.add(obj);
            canvas.setActiveObject(obj);
            canvas.renderAll();
            setTool('select');
        }

        // --- Context Menu ---
        function showContextMenu(x, y) {
            const menu = document.getElementById('customContextMenu');
            menu.style.display = 'block';
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
        }

        function addTextToPresetFromMenu() {
            if(activeTextForMenu && activeTextForMenu.text) {
                addPreset(activeTextForMenu.text);
            }
            document.getElementById('customContextMenu').style.display = 'none';
        }

        window.addEventListener('contextmenu', e => {
            if(e.target.tagName === 'CANVAS') e.preventDefault();
        });

        // --- History (Undo/Delete) ---
        function initHistory(id) {
            if(!pageHistory[id]) pageHistory[id] = { undo: [], redo: [] };
        }

        function saveHistory(canvas) {
            const id = canvas.getElement().id;
            initHistory(id);
            if(pageHistory[id].undo.length > 20) pageHistory[id].undo.shift();
            pageHistory[id].undo.push(JSON.stringify(canvas.toJSON(['id'])));
            pageHistory[id].redo = [];
        }

        function undo(canvas) {
            const id = canvas.getElement().id;
            initHistory(id);
            if(pageHistory[id].undo.length === 0) return;
            pageHistory[id].redo.push(JSON.stringify(canvas.toJSON(['id'])));
            loadCanvasState(canvas, pageHistory[id].undo.pop());
        }

        function loadCanvasState(canvas, jsonStr) {
            const json = JSON.parse(jsonStr);
            const bg = canvas.backgroundImage;
            canvas.loadFromJSON(json, () => {
                canvas.setBackgroundImage(bg, canvas.renderAll.bind(canvas));
                applyToolSettings(canvas);
            });
        }

        window.addEventListener('keydown', e => {
            if((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key.toLowerCase() === 'z') {
                e.preventDefault();
                activeCanvases.forEach(item => undo(item.canvas));
            }
            if(e.key === 'Delete' || e.key === 'Backspace') {
                if(document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT') return;
                activeCanvases.forEach(item => {
                    const objs = item.canvas.getActiveObjects();
                    if(objs.length) {
                        saveHistory(item.canvas);
                        item.canvas.discardActiveObject();
                        objs.forEach(o => item.canvas.remove(o));
                    }
                });
            }
        });

        function attachHistoryEvents(canvas) {
            canvas.on('object:modified', () => saveHistory(canvas));
            canvas.on('path:created', () => saveHistory(canvas));
        }

        // --- Project Save/Load ---
        async function saveProject() {
            if(projectFiles.length === 0) return alert('ไม่มีข้อมูลเอกสาร');
            showLoading(true);
            try {
                const promises = projectFiles.map(async f => {
                    const b64 = await readFileAsDataURL(f.file);
                    return { name: f.name, type: f.type, selectedPages: f.selectedPages, data: b64 };
                });
                const dataFiles = await Promise.all(promises);
                const projectData = {
                    version: "1.0", timestamp: new Date().toISOString(),
                    files: dataFiles, presets: textPresets, masterStamps: masterStampsJSON,
                    slots: {
                        1: localStorage.getItem('pdfstamp_slot_1_pos'),
                        2: localStorage.getItem('pdfstamp_slot_2_pos'),
                        3: localStorage.getItem('pdfstamp_slot_3_pos'),
                        4: localStorage.getItem('pdfstamp_slot_4_pos'),
                        5: localStorage.getItem('pdfstamp_slot_5_pos')
                    }
                };
                saveAs(new Blob([JSON.stringify(projectData)], {type: "application/json"}), `PDFStamp_Project_${Date.now()}.pdfstamp`);
            } catch(e) { alert('เกิดข้อผิดพลาด: ' + e.message); }
            showLoading(false);
        }

        function loadProject(input) {
            const file = input.files[0];
            if(!file) return;
            showLoading(true);
            const reader = new FileReader();
            reader.onload = async e => {
                try {
                    const data = JSON.parse(e.target.result);
                    textPresets = data.presets || [];
                    localStorage.setItem('pdfstamp_presets', JSON.stringify(textPresets));
                    renderPresets();
                    
                    if(data.masterStamps) {
                        masterStampsJSON = data.masterStamps;
                        localStorage.setItem('pdfstamp_master_pos', masterStampsJSON);
                    }
                    if(data.slots) {
                        for(let k in data.slots) if(data.slots[k]) localStorage.setItem(`pdfstamp_slot_${k}_pos`, data.slots[k]);
                    }
                    
                    projectFiles = []; activeCanvases = [];
                    for(let fd of data.files) {
                        const res = await fetch(fd.data);
                        const blob = await res.blob();
                        const rawFile = new File([blob], fd.name, {type: fd.type});
                        let pdfDoc = null, totalP = 1;
                        if(fd.type === 'application/pdf') {
                            const ab = await rawFile.arrayBuffer();
                            pdfDoc = await pdfjsLib.getDocument(ab).promise;
                            totalP = pdfDoc.numPages;
                        }
                        projectFiles.push({
                            id: Date.now() + Math.random().toString(16).slice(2),
                            file: rawFile, name: fd.name, type: fd.type,
                            pdfDoc: pdfDoc, totalPages: totalP, selectedPages: fd.selectedPages
                        });
                    }
                    renderSidebar();
                    await renderRightPanel();
                    alert('✅ เปิดโปรเจกต์เรียบร้อย');
                } catch(err) { alert('รูปแบบไฟล์ไม่ถูกต้อง หรือเกิดข้อผิดพลาด: ' + err.message); }
                showLoading(false);
                input.value = '';
            };
            reader.readAsText(file);
        }

        // --- Core Functions ---
        function adjustZoom(delta) {
            currentZoom += delta;
            if(currentZoom < 0.2) currentZoom = 0.2;
            if(currentZoom > 3) currentZoom = 3;
            document.getElementById('scalableContent').style.transform = `scale(${currentZoom})`;
            document.getElementById('zoomDisplay').innerText = Math.round(currentZoom * 100) + '%';
        }

        document.getElementById('docUpload').addEventListener('change', async e => {
            const files = Array.from(e.target.files);
            if(!files.length) return;
            showLoading(true);
            for(let f of files) {
                let totalP = 1, pdfDoc = null;
                if(f.type === 'application/pdf') {
                    const ab = await f.arrayBuffer();
                    pdfDoc = await pdfjsLib.getDocument(ab).promise;
                    totalP = pdfDoc.numPages;
                }
                projectFiles.push({
                    id: Date.now() + Math.random().toString(16).slice(2),
                    file: f, name: f.name, type: f.type,
                    pdfDoc: pdfDoc, totalPages: totalP, selectedPages: [1]
                });
            }
            renderSidebar();
            renderRightPanel();
            showLoading(false);
            e.target.value = '';
            
            // On mobile, auto-close sidebar after upload to show canvas
            if(window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('-translate-x-full');
                document.getElementById('sidebarOverlay').classList.add('hidden');
            }
        });

        function renderSidebar() {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            projectFiles.forEach(doc => {
                const item = document.createElement('div');
                item.className = 'bg-white border border-slate-200 rounded-xl p-3 shadow-sm';
                
                const header = document.createElement('div');
                header.className = 'flex justify-between items-center mb-2';
                
                const titleWrapper = document.createElement('div');
                titleWrapper.className = 'flex items-center gap-2 overflow-hidden';
                titleWrapper.innerHTML = `<span class="truncate text-sm font-bold text-slate-700">📄 ${doc.name}</span>`;
                
                const btnAll = document.createElement('button');
                btnAll.className = 'bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs px-2 py-1 rounded transition-colors';
                btnAll.innerText = 'All';
                btnAll.onclick = e => { e.stopPropagation(); toggleAllPages(doc.id); };
                titleWrapper.appendChild(btnAll);
                header.appendChild(titleWrapper);
                
                const btnRemove = document.createElement('button');
                btnRemove.className = 'text-red-400 hover:text-red-600 font-bold px-1 text-lg leading-none';
                btnRemove.innerHTML = '&times;';
                btnRemove.onclick = e => { e.stopPropagation(); removeFile(doc.id); };
                header.appendChild(btnRemove);
                item.appendChild(header);
                
                const pageContainer = document.createElement('div');
                pageContainer.className = 'flex flex-wrap gap-1.5';
                for(let n = 1; n <= doc.totalPages; n++) {
                    const pBtn = document.createElement('button');
                    pBtn.innerText = n;
                    const isSelected = doc.selectedPages.includes(n);
                    pBtn.className = `w-8 h-8 flex items-center justify-center text-xs font-medium rounded-md border transition-colors ${isSelected ? 'bg-blue-500 text-white border-blue-600 shadow-inner' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`;
                    pBtn.onclick = e => { e.stopPropagation(); togglePageSelection(doc.id, n); };
                    pageContainer.appendChild(pBtn);
                }
                item.appendChild(pageContainer);
                list.appendChild(item);
            });
        }

        function toggleAllPages(id) {
            const doc = projectFiles.find(f => f.id === id);
            if(!doc) return;
            if(doc.selectedPages.length === doc.totalPages) doc.selectedPages = [];
            else doc.selectedPages = Array.from({length: doc.totalPages}, (_, i) => i + 1);
            renderSidebar(); renderRightPanel();
        }

        function togglePageSelection(id, n) {
            const doc = projectFiles.find(f => f.id === id);
            if(!doc) return;
            if(doc.selectedPages.includes(n)) doc.selectedPages = doc.selectedPages.filter(p => p !== n);
            else {
                doc.selectedPages.push(n);
                doc.selectedPages.sort((a, b) => a - b);
            }
            renderSidebar(); renderRightPanel();
        }

        function removeFile(id) {
            projectFiles = projectFiles.filter(f => f.id !== id);
            renderSidebar(); renderRightPanel();
        }

        async function renderRightPanel() {
            const container = document.getElementById('scalableContent');
            container.innerHTML = '';
            activeCanvases = [];
            
            if(!projectFiles.length) {
                container.innerHTML = `
                <div class="text-slate-400 text-center mt-20 text-lg flex flex-col items-center">
                    <svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    คลิก <strong>+ เพิ่มเอกสาร</strong> ที่เมนูด้านซ้าย<br>เพื่อเริ่มต้นทำงาน
                </div>`;
                return;
            }

            let hasPages = false;
            for(let doc of projectFiles) {
                for(let n of doc.selectedPages) {
                    hasPages = true;
                    
                    const wrapper = document.createElement('div');
                    wrapper.className = 'bg-white shadow-xl rounded-lg relative overflow-visible border border-slate-200';
                    
                    const label = document.createElement('div');
                    label.className = 'absolute -top-8 left-0 text-xs font-bold bg-slate-700 text-white px-3 py-1.5 rounded-t-lg flex gap-1 shadow-sm';
                    label.innerHTML = `<span class="text-slate-300 font-normal">ไฟล์:</span> <span class="text-blue-300 truncate max-w-[150px] sm:max-w-xs">${doc.name}</span> <span class="text-slate-400 mx-1">|</span> <span class="text-slate-300 font-normal">หน้า:</span> <span class="text-emerald-400">${n}</span>`;
                    wrapper.appendChild(label);
                    
                    const canvasEl = document.createElement('canvas');
                    canvasEl.id = `c_${doc.id}_${n}`;
                    wrapper.appendChild(canvasEl);
                    container.appendChild(wrapper);
                    
                    const fCanvas = new fabric.Canvas(canvasEl.id);
                    fCanvas.on('mouse:down', opt => {
                        if(opt.e.button === 2 && opt.target && opt.target.type === 'i-text') {
                            activeTextForMenu = opt.target;
                            showContextMenu(opt.e.clientX, opt.e.clientY);
                            fCanvas.setActiveObject(opt.target);
                            fCanvas.renderAll();
                        } else {
                            document.getElementById('customContextMenu').style.display = 'none';
                        }
                    });
                    attachHistoryEvents(fCanvas);
                    applyToolSettings(fCanvas);
                    
                    let wd, ht, url;
                    if(doc.type === 'application/pdf') {
                        const page = await doc.pdfDoc.getPage(n);
                        const viewport = page.getViewport({scale: 2}); // high res
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = viewport.width;
                        tempCanvas.height = viewport.height;
                        await page.render({canvasContext: tempCanvas.getContext('2d'), viewport: viewport}).promise;
                        url = tempCanvas.toDataURL();
                        wd = viewport.width; ht = viewport.height;
                    } else {
                        url = await readFileAsDataURL(doc.file);
                        const img = await loadImage(url);
                        wd = img.width; ht = img.height;
                    }
                    
                    await new Promise(r => {
                        fabric.Image.fromURL(url, img => {
                            fCanvas.setWidth(wd);
                            fCanvas.setHeight(ht);
                            fCanvas.setBackgroundImage(img, fCanvas.renderAll.bind(fCanvas));
                            r();
                        });
                    });
                    
                    if(masterStampsJSON) await applyMasterStamps(fCanvas);
                    activeCanvases.push({ fileId: doc.id, pageNum: n, canvas: fCanvas });
                }
            }
            
            if(!hasPages) {
                container.innerHTML = '<div class="text-slate-400 text-center mt-20 text-lg">กรุณาเลือกหน้าเอกสารในแถบด้านซ้าย</div>';
            }
            setTool(currentTool);
        }

        // --- Stamps & Slots ---
        document.getElementById('stampUpload').addEventListener('change', e => {
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = ev => {
                    addToGallery(ev.target.result);
                    addStampToAll(ev.target.result);
                };
                reader.readAsDataURL(file);
            });
        });

        function addToGallery(src) {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'h-8 w-auto object-contain border border-slate-300 bg-white rounded cursor-pointer hover:border-blue-500 hover:scale-110 transition-all';
            img.onclick = () => addStampToAll(src);
            document.getElementById('stampGallery').appendChild(img);
        }

        function addStampToAll(url) {
            if(!activeCanvases.length) return alert('กรุณาเลือกหน้าเอกสารก่อน');
            activeCanvases.forEach(item => {
                saveHistory(item.canvas);
                fabric.Image.fromURL(url, img => {
                    img.scale(0.5);
                    img.set({
                        left: item.canvas.width/2 - (img.width*img.scaleX)/2,
                        top: item.canvas.height/2 - (img.height*img.scaleY)/2
                    });
                    item.canvas.add(img);
                    item.canvas.setActiveObject(img);
                });
            });
            setTool('select');
        }

        function saveToCurrentSlot() {
            if(!activeCanvases.length) return alert('ไม่มีหน้าเอกสารให้บันทึก');
            const slot = document.getElementById('slotSelect').value;
            const canvas = activeCanvases[0].canvas;
            const jsonStr = JSON.stringify(canvas.toJSON(['id']));
            localStorage.setItem(`pdfstamp_slot_${slot}_pos`, jsonStr);
            
            const firstImg = canvas.getObjects().find(ob => ob.type === 'image');
            if(firstImg) localStorage.setItem(`pdfstamp_slot_${slot}_img`, firstImg.getSrc());
            
            localStorage.setItem('pdfstamp_last_slot', slot);
            masterStampsJSON = jsonStr;
            alert(`✅ บันทึกรูปแบบลง Slot ${slot} เรียบร้อยแล้ว`);
        }

        function loadFromCurrentSlot() {
            loadFromSlot(document.getElementById('slotSelect').value);
        }

        function loadFromSlot(slot, silent = false) {
            const savedPos = localStorage.getItem(`pdfstamp_slot_${slot}_pos`);
            const savedImg = localStorage.getItem(`pdfstamp_slot_${slot}_img`);
            
            if(savedPos) {
                masterStampsJSON = savedPos;
                localStorage.setItem('pdfstamp_last_slot', slot);
                if(savedImg && !Array.from(document.getElementById('stampGallery').children).some(img => img.src === savedImg)) {
                    addToGallery(savedImg);
                }
                if(activeCanvases.length > 0) renderRightPanel();
            } else {
                if(!silent) alert(`Slot ${slot} ว่างเปล่า ยังไม่มีการบันทึก`);
                masterStampsJSON = null;
            }
        }

        function clearAllSignatures() {
            if(!confirm('ยืนยันล้างข้อมูลที่วาด/พิมพ์ทั้งหมด บนหน้าเอกสารที่เปิดอยู่?')) return;
            activeCanvases.forEach(item => {
                saveHistory(item.canvas);
                item.canvas.clear();
            });
            renderRightPanel();
        }

        function applyMasterStamps(canvas) {
            return new Promise(resolve => {
                fabric.util.enlivenObjects(JSON.parse(masterStampsJSON), objs => {
                    objs.forEach(o => { o.set('dirty', true); canvas.add(o); });
                    canvas.renderAll();
                    resolve();
                });
            });
        }

        // --- Export & Download ---
        function downloadAllFiles() {
            const format = document.getElementById('dlFormat').value;
            if(format === 'pdf') downloadAllFilesPDFZip();
            else downloadAllFilesJPGZip();
        }

        async function downloadAllFilesPDFZip() {
            if(!projectFiles.length) return alert('ไม่มีไฟล์เอกสาร');
            showLoading(true);
            const zip = new JSZip();
            const { jsPDF } = window.jspdf;
            
            for(let doc of projectFiles) {
                if(doc.selectedPages.length === 0) continue;
                const pdf = new jsPDF();
                pdf.deletePage(1);
                
                for(let i = 1; i <= doc.totalPages; i++) {
                    if(!doc.selectedPages.includes(i)) continue;
                    const { data, width, height } = await getRenderedPageData(doc, i, true);
                    const orientation = width > height ? 'l' : 'p';
                    pdf.addPage([width, height], orientation);
                    pdf.addImage(data, 'JPEG', 0, 0, width, height);
                }
                if(pdf.internal.getNumberOfPages() > 0) {
                    zip.file(`${doc.name.replace(/\.[^/.]+$/, "")}_signed.pdf`, pdf.output('blob'));
                }
            }
            saveAs(await zip.generateAsync({type:"blob"}), "Signed_Documents.zip");
            showLoading(false);
        }

        async function downloadAllFilesJPGZip() {
            if(!projectFiles.length) return alert('ไม่มีไฟล์เอกสาร');
            showLoading(true);
            const zip = new JSZip();
            
            for(let doc of projectFiles) {
                if(doc.selectedPages.length === 0) continue;
                const folder = zip.folder(doc.name.replace(/\.[^/.]+$/, ""));
                for(let i = 1; i <= doc.totalPages; i++) {
                    if(!doc.selectedPages.includes(i)) continue;
                    const { data } = await getRenderedPageData(doc, i, true);
                    folder.file(`Page_${i}.jpg`, await (await fetch(data)).blob());
                }
            }
            saveAs(await zip.generateAsync({type:"blob"}), "Signed_Images_JPG.zip");
            showLoading(false);
        }

        async function getRenderedPageData(doc, pageNum, withStamps = true) {
            const active = activeCanvases.find(c => c.fileId === doc.id && c.pageNum === pageNum);
            if(active && withStamps) {
                active.canvas.discardActiveObject();
                active.canvas.renderAll();
                return {
                    data: active.canvas.toDataURL({format: 'jpeg', quality: 0.8}),
                    width: active.canvas.width, height: active.canvas.height
                };
            } else {
                return await renderOffScreen(doc, pageNum, withStamps);
            }
        }

        async function renderOffScreen(doc, pageNum, applyStamps) {
            const tempEl = document.createElement('canvas');
            const fCanvas = new fabric.Canvas(tempEl);
            let w, h;
            
            if(doc.type === 'application/pdf') {
                const page = await doc.pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({scale: 2});
                w = viewport.width; h = viewport.height;
                tempEl.width = w; tempEl.height = h;
                await page.render({canvasContext: tempEl.getContext('2d'), viewport: viewport}).promise;
                const url = tempEl.toDataURL();
                await new Promise(r => fabric.Image.fromURL(url, img => {
                    fCanvas.setWidth(w); fCanvas.setHeight(h);
                    fCanvas.setBackgroundImage(img, r);
                }));
            } else {
                const url = await readFileAsDataURL(doc.file);
                const img = await loadImage(url);
                w = img.width; h = img.height;
                await new Promise(r => fabric.Image.fromURL(url, im => {
                    fCanvas.setWidth(w); fCanvas.setHeight(h);
                    fCanvas.setBackgroundImage(im, r);
                }));
            }
            
            if(applyStamps && masterStampsJSON) await applyMasterStamps(fCanvas);
            const dataURL = fCanvas.toDataURL({format: 'jpeg', quality: 0.8});
            fCanvas.dispose();
            return { data: dataURL, width: w, height: h };
        }

        // --- Utils ---
        function readFileAsDataURL(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        function loadImage(url) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.src = url;
            });
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }
    </script>
</body>
